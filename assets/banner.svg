<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a16" />
      <stop offset="50%" stop-color="#120c1f" />
      <stop offset="100%" stop-color="#05050d" />
    </linearGradient>

    <!-- Neon Cyan Gradient -->
    <linearGradient id="neon-cyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>

    <!-- Neon Pink Gradient -->
    <linearGradient id="neon-pink" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff0844" />
      <stop offset="100%" stop-color="#ffb199" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    @keyframes pulse-border {
      0%, 100% { 
        stroke: url(#neon-cyan); 
        filter: drop-shadow(0 0 3px #00f2fe); 
      }
      50% { 
        stroke: url(#neon-pink); 
        filter: drop-shadow(0 0 8px #ff0844); 
      }
    }

    @keyframes text-glow {
      0%, 100% { 
        text-shadow: 0 0 4px rgba(0, 242, 254, 0.6), 0 0 10px rgba(0, 242, 254, 0.4); 
        fill: #ffffff;
      }
      50% { 
        text-shadow: 0 0 8px rgba(255, 8, 68, 0.8), 0 0 20px rgba(255, 8, 68, 0.6); 
        fill: #fdf5f7;
      }
    }

    .border {
      stroke-width: 3;
      animation: pulse-border 6s infinite alternate;
    }

    .title {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-weight: 900;
      font-size: 48px;
      fill: #ffffff;
      letter-spacing: 8px;
      animation: text-glow 6s infinite alternate;
    }

    .subtitle {
      font-family: 'Courier New', Courier, monospace;
      font-weight: bold;
      font-size: 16px;
      fill: #00f2fe;
      letter-spacing: 3px;
      opacity: 0.9;
    }

    .grid-lines {
      stroke: #1f1a3a;
      stroke-width: 0.8;
      opacity: 0.35;
    }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg-gradient)" />

  <!-- Background Grid -->
  <g class="grid-lines">
    <!-- Horizontal lines -->
    <line x1="0" y1="25" x2="800" y2="25" />
    <line x1="0" y1="50" x2="800" y2="50" />
    <line x1="0" y1="75" x2="800" y2="75" />
    <line x1="0" y1="100" x2="800" y2="100" />
    <line x1="0" y1="125" x2="800" y2="125" />
    <line x1="0" y1="150" x2="800" y2="150" />
    <line x1="0" y1="175" x2="800" y2="175" />
    <line x1="0" y1="200" x2="800" y2="200" />
    <line x1="0" y1="225" x2="800" y2="225" />
    <!-- Vertical lines -->
    <line x1="50" y1="0" x2="50" y2="250" />
    <line x1="100" y1="0" x2="100" y2="250" />
    <line x1="150" y1="0" x2="150" y2="250" />
    <line x1="200" y1="0" x2="200" y2="250" />
    <line x1="250" y1="0" x2="250" y2="250" />
    <line x1="300" y1="0" x2="300" y2="250" />
    <line x1="350" y1="0" x2="350" y2="250" />
    <line x1="400" y1="0" x2="400" y2="250" />
    <line x1="450" y1="0" x2="450" y2="250" />
    <line x1="500" y1="0" x2="500" y2="250" />
    <line x1="550" y1="0" x2="550" y2="250" />
    <line x1="600" y1="0" x2="600" y2="250" />
    <line x1="650" y1="0" x2="650" y2="250" />
    <line x1="700" y1="0" x2="700" y2="250" />
    <line x1="750" y1="0" x2="750" y2="250" />
  </g>

  <!-- Glowing shapes in background for ambient lighting -->
  <circle cx="150" cy="125" r="90" fill="#00f2fe" opacity="0.08" filter="url(#glow)" />
  <circle cx="650" cy="125" r="100" fill="#ff0844" opacity="0.08" filter="url(#glow)" />

  <!-- Neon Border -->
  <rect x="5" y="5" width="790" height="240" rx="8" fill="none" class="border" />

  <!-- Content -->
  <g transform="translate(400, 115)" text-anchor="middle">
    <!-- Main Title -->
    <text class="title" y="0">THEJUS</text>
    <!-- Subtitle / Tagline -->
    <text class="subtitle" y="45">&lt; FULL-STACK DEVELOPER &amp; DESIGNER /&gt;</text>
  </g>
</svg>
